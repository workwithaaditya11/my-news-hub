name: News Email Sender

on:
  schedule:
    - cron: '*/30 * * * *'   # हरेक 30 मिनेटमा
  workflow_dispatch:           # Manual run पनि गर्न मिल्छ

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Restore seen news cache
        uses: actions/cache@v4
        with:
          path: seen_news.json
          key: seen-news-${{ github.run_id }}
          restore-keys: seen-news-

      - name: Fetch news and send email
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL:  ${{ secrets.RECEIVER_EMAIL }}
        run: python send_news.py

      - name: Save seen news cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_news.json
          key: seen-news-${{ github.run_id }}

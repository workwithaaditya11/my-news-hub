<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global News Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
      --border: #2a2a35; --text: #e8e8f0; --muted: #888898;
      --accent: #e63946; --accent2: #457b9d; --nepal: #ff6b35;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .logo h1 { font-size: 18px; font-weight: 700; }
    .logo span { color: var(--accent); }
    .live-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
    .ticker { background: var(--accent); color: #fff; padding: 8px 0; overflow: hidden; white-space: nowrap; }
    .ticker-inner { display: inline-block; animation: scroll 50s linear infinite; }
    @keyframes scroll { from{transform:translateX(100vw)} to{transform:translateX(-100%)} }
    .ticker-label { display: inline-block; background: #fff; color: var(--accent); font-weight: 700; font-size: 12px; padding: 0 10px; margin-right: 20px; border-radius: 3px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--accent2); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn.nepal-btn.active { background: var(--nepal); border-color: var(--nepal); }
    .grid { display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .news-grid { display: flex; flex-direction: column; gap: 10px; }
    .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color 0.2s; text-decoration: none; color: inherit; display: block; }
    .news-card:hover { border-color: var(--accent2); }
    .news-card.nepal { border-left: 3px solid var(--nepal); }
    .news-card.conflict { border-left: 3px solid var(--accent); }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
    .tag-geo { background: #1a2840; color: var(--accent2); }
    .tag-pol { background: #2a1a2a; color: #c77dff; }
    .tag-conflict { background: #2a1a1a; color: var(--accent); }
    .tag-nepal { background: #2a1a0a; color: var(--nepal); }
    .card-time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .card-source { font-size: 11px; color: var(--muted); }
    .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .sidebar { display: flex; flex-direction: column; gap: 16px; }
    .sidebar-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .sidebar-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
    .trend-item { padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; gap: 10px; }
    .trend-item:last-child { border-bottom: none; }
    .trend-num { color: var(--accent); font-weight: 700; font-size: 12px; min-width: 18px; }
    .trend-text { color: var(--muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    @media(max-width:900px){ .grid{grid-template-columns:1fr} .sidebar{display:none} }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>Global<span>News</span></h1>
    <span class="live-badge">LIVE</span>
  </div>
  <span id="lastUpdated" style="font-size:12px;color:var(--muted)">Loading...</span>
</header>
<div class="ticker"><span class="ticker-inner" id="tickerText"><span class="ticker-label">BREAKING</span> Loading headlines...</span></div>
<div class="container">
  <div class="filters">
    <button class="filter-btn active" onclick="filterNews('all',event)">🌐 All</button>
    <button class="filter-btn" onclick="filterNews('Geopolitics',event)">🗺️ Geopolitics</button>
    <button class="filter-btn" onclick="filterNews('Politics',event)">🏛️ Politics</button>
    <button class="filter-btn" onclick="filterNews('Conflict',event)">⚔️ Conflict</button>
    <button class="filter-btn nepal-btn" onclick="filterNews('Nepal',event)">🇳🇵 Nepal</button>
  </div>
  <div class="grid">
    <div>
      <div class="section-title">Latest News</div>
      <div class="news-grid" id="newsContainer"><div style="text-align:center;padding:40px;color:var(--muted)"><div class="spinner"></div><p>Fetching news...</p></div></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-card"><div class="sidebar-title">🔥 Trending</div><div id="trendingList"></div></div>
      <div class="sidebar-card"><div class="sidebar-title">📡 Sources</div><div style="font-size:13px;color:var(--muted);line-height:2.2">Reuters · BBC News<br>Al Jazeera · Guardian<br>OnlineKhabar · Setopati<br>Ratopati</div></div>
    </div>
  </div>
</div>
<script>
const FEEDS = [
  { url: 'https://feeds.bbci.co.uk/news/world/rss.xml',       source: 'BBC News',     cat: 'Geopolitics' },
  { url: 'https://www.aljazeera.com/xml/rss/all.xml',         source: 'Al Jazeera',   cat: 'Conflict'    },
  { url: 'https://rss.theguardian.com/theguardian/world/rss', source: 'The Guardian', cat: 'Politics'    },
  { url: 'https://www.onlinekhabar.com/feed',                  source: 'OnlineKhabar', cat: 'Nepal'       },
  { url: 'https://www.setopati.com/feed',                      source: 'Setopati',     cat: 'Nepal'       },
  { url: 'https://ratopati.com/feed',                          source: 'Ratopati',     cat: 'Nepal'       },
];

const PROXIES = [
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

let allNews = [], currentFilter = 'all';

async function fetchWithProxy(url) {
  for (const p of PROXIES) {
    try {
      const r = await fetch(p(url), { signal: AbortSignal.timeout(8000) });
      if (!r.ok) continue;
      const d = await r.json();
      const c = d.contents || d.body || '';
      if (c.includes('<item>')) return c;
    } catch {}
  }
  return null;
}

async function fetchFeed(feed) {
  const raw = await fetchWithProxy(feed.url);
  if (!raw) return [];
  try {
    const xml = new DOMParser().parseFromString(raw, 'text/xml');
    return [...xml.querySelectorAll('item')].slice(0,12).map(i => ({
      title:   i.querySelector('title')?.textContent?.trim() || '',
      desc:    (i.querySelector('description')?.textContent||'').replace(/<[^>]+>/g,'').trim().slice(0,150),
      link:    i.querySelector('link')?.textContent?.trim() || '#',
      pubDate: i.querySelector('pubDate')?.textContent || '',
      source:  feed.source, cat: feed.cat,
    })).filter(n => n.title);
  } catch { return []; }
}

const TAG = {
  Geopolitics: '<span class="tag tag-geo">Geopolitics</span>',
  Politics:    '<span class="tag tag-pol">Politics</span>',
  Conflict:    '<span class="tag tag-conflict">Conflict</span>',
  Nepal:       '<span class="tag tag-nepal">Nepal 🇳🇵</span>',
};

function timeAgo(d) {
  if (!d) return '';
  const m = Math.floor((Date.now()-new Date(d))/60000);
  if (m<1) return 'Just now';
  if (m<60) return m+'m ago';
  const h=Math.floor(m/60);
  if (h<24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}

function renderNews(news) {
  const c = document.getElementById('newsContainer');
  if (!news.length) { c.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No news found.</div>'; return; }
  c.innerHTML = news.map(n=>`
    <a class="news-card ${n.cat==='Nepal'?'nepal':n.cat==='Conflict'?'conflict':''}" href="${n.link}" target="_blank" rel="noopener">
      <div class="card-meta">${TAG[n.cat]||''}<span class="card-source">${n.source}</span><span class="card-time">${timeAgo(n.pubDate)}</span></div>
      <div class="card-title">${n.title}</div>
      ${n.desc?`<div class="card-desc">${n.desc}...</div>`:''}
    </a>`).join('');
}

function filterNews(cat, e) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(e) e.target.classList.add('active');
  renderNews(cat==='all'?allNews:allNews.filter(n=>n.cat===cat));
}

async function init() {
  document.getElementById('lastUpdated').textContent='Updating...';
  const results = await Promise.allSettled(FEEDS.map(fetchFeed));
  allNews = results.flatMap(r=>r.status==='fulfilled'?r.value:[]).sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  renderNews(currentFilter==='all'?allNews:allNews.filter(n=>n.cat===currentFilter));
  if (allNews.length) {
    const words={};
    allNews.forEach(n=>n.title.split(' ').filter(w=>w.length>5).forEach(w=>{words[w]=(words[w]||0)+1;}));
    const top=Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,7);
    document.getElementById('trendingList').innerHTML=top.map((t,i)=>`<div class="trend-item"><span class="trend-num">${i+1}</span><span class="trend-text">${t[0]}</span></div>`).join('');
    document.getElementById('tickerText').innerHTML='<span class="ticker-label">BREAKING</span>'+allNews.slice(0,8).map(n=>' ⬥ '+n.title).join('');
  }
  document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
init();
setInterval(init,15*60*1000);
</script>
</body>
</html>
